<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Fondo con el color de tu app y bordes redondeados tipo dashboard -->
  <rect width="64" height="64" rx="16" fill="#05080B"/>
  
  <!-- Un pequeño brillo sutil de fondo (el bg-primary/10 que usás) -->
  <rect x="12" y="12" width="40" height="40" rx="12" fill="#00C2A8" fill-opacity="0.1"/>

  <!-- El icono de Link estilizado (basado en Tabler Icons) -->
  <g stroke="#00C2A8" stroke-width="4.5" stroke-linecap="round" stroke-linejoin="round">
    <!-- Eslabón superior -->
    <path d="M28 22H24C19.5817 22 16 25.5817 16 30C16 34.4183 19.5817 38 24 38H28" />
    <!-- Eslabón inferior -->
    <path d="M36 26H40C44.4183 26 48 29.5817 48 34C48 38.4183 44.4183 42 40 42H36" />
    <!-- Línea de conexión -->
    <path d="M26 32H38" stroke-width="4" opacity="0.8" />
  </g>
</svg>